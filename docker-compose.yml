version: '3.8'

services:
  backend:
    build: .
    container_name: dev_knowledge_copilot_backend
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - APP_ENV=production
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/v1/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
